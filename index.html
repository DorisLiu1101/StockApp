normal text-gray-600">(選填)</span></label><input type="text" id="tx-name" class="w-full bg-[#050505] border border-[#333] rounded px-2 py-1.5 text-sm text-[#D4AF37] focus:border-gold outline-none h-[38px] font-bold placeholder-gray-700 truncate"></div></div><div class="grid grid-cols-2 gap-2"><div><label class="text-[10px] text-gray-400 font-bold tracking-wide mb-1 block">價格</label><input type="number" id="tx-price" oninput="window.txService.resetTxStatus()" class="w-full bg-[#050505] border border-[#333] rounded px-2 py-1.5 text-sm text-white focus:border-gold outline-none h-[38px] font-mono appearance-none" placeholder="0.00"></div><div><label class="text-[10px] text-gray-400 font-bold tracking-wide mb-1 block">股數</label><input type="number" id="tx-qty" oninput="window.txService.resetTxStatus()" class="w-full bg-[#050505] border border-[#333] rounded px-2 py-1.5 text-sm text-white focus:border-gold outline-none h-[38px] font-mono appearance-none" placeholder="0"></div></div><button id="btn-tx-submit" onclick="window.txService.saveTransaction()" class="w-full bg-gold hover:bg-[#FFE082] text-black font-bold py-3 rounded text-sm tracking-widest shadow-lg transition active:scale-95 mt-2 focus:outline-none disabled:opacity-50 disabled:cursor-not-allowed">確認新增</button><div id="tx-status" class="text-center text-xs h-4 font-mono transition-colors font-bold"></div></div></div></div>

    <nav class="fixed bottom-0 w-full bottom-nav shadow-2xl z-40">
        <div class="max-w-md mx-auto flex justify-around items-center px-4 h-16">
            <button onclick="window.navToPage('home')" id="nav-home" class="flex flex-col items-center justify-center w-16 h-16 bottom-nav-item"><span class="material-icons text-2xl mb-0.5">dashboard</span><span class="text-xs font-bold">總覽</span></button>
            <button onclick="window.navToPage('screen')" id="nav-screen" class="flex flex-col items-center justify-center w-16 h-16 bottom-nav-item"><span class="material-icons text-2xl mb-0.5">manage_search</span><span class="text-xs font-bold">篩股</span></button>
            <button onclick="window.txService.openTransactionModal('TW','')" class="flex flex-col items-center justify-center w-16 h-16 bottom-nav-item hover:text-gold transition group"><span class="material-icons text-3xl mb-0.5 group-hover:scale-110 transition-transform">add_circle_outline</span><span class="text-xs font-bold">新增</span></button>
            <button onclick="window.navToPage('pick')" id="nav-pick" class="flex flex-col items-center justify-center w-16 h-16 bottom-nav-item"><span class="material-icons text-2xl mb-0.5">star_border</span><span class="text-xs font-bold">收藏</span></button>
            <button onclick="window.navToPage('list')" id="nav-list" class="flex flex-col items-center justify-center w-16 h-16 bottom-nav-item"><span class="material-icons text-2xl mb-0.5">list_alt</span><span class="text-xs font-bold">庫存</span></button>
        </div>
    </nav>

    <script type="module" src="js/app.js"></script>
</body>
</html>
