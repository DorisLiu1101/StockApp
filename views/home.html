<div class="space-y-6 md:space-y-0 md:grid md:grid-cols-2 md:gap-6 lg:gap-8 animate-[fadeIn_0.3s_ease-out]">
    <div class="app-card p-6 relative overflow-hidden">
        <div class="absolute -right-6 -top-6 opacity-10"><span class="material-icons text-9xl text-gold">account_balance</span></div>
        <div class="relative z-10">
            <div class="flex items-center gap-2 mb-3"><span class="text-xs text-gold uppercase tracking-widest border border-gold px-2 py-0.5 rounded font-bold">Total Assets</span></div>
            <div class="flex items-baseline gap-2 mb-8"><span class="text-xl text-gray-400 font-serif">NT$</span><span id="total-asset" class="text-5xl font-light text-white tracking-wide">--</span></div>
            <div class="grid grid-cols-3 gap-4 border-t border-[#333] pt-5">
                <div><div class="text-xs text-gray-400 mb-1 uppercase font-bold">損益</div><div id="daily-profit" class="text-gray-200 font-bold text-lg">--</div></div>
                <div class="border-l border-[#333] pl-4"><div class="text-xs text-gray-400 mb-1 uppercase font-bold">報酬</div><div id="total-return" class="text-gray-200 font-bold text-lg">--</div></div>
                <div class="border-l border-[#333] pl-4"><div class="text-xs text-gray-400 mb-1 uppercase font-bold">現金</div><div id="cash-level" class="text-gray-200 font-bold text-lg">--</div></div>
            </div>
        </div>
    </div>
    <div class="app-card p-6 flex flex-col justify-center">
        <div class="flex justify-between items-center mb-5 relative min-h-[32px]">
            <h2 class="text-sm font-bold text-gray-300 uppercase tracking-widest">Portfolio</h2>
            <div class="relative">
                <select onchange="window.portfolioService.updateHomeChart(this.value)" class="bg-[#1A1A1A] text-[#D4AF37] border border-[#D4AF37]/40 rounded-lg px-3 py-1.5 text-xs font-bold tracking-widest focus:outline-none appearance-none pr-9 cursor-pointer hover:border-[#D4AF37] shadow-sm">
                    <option value="ALL">ALL</option><option value="TW">TW</option><option value="US">US</option><option value="JP">JP</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-[#D4AF37]"><span class="material-icons text-sm">expand_more</span></div>
            </div>
        </div>
        <div class="flex items-center gap-8 justify-center md:justify-start">
            <div id="portfolio-chart" class="w-[140px] h-[140px] rounded-full relative flex justify-center items-center shadow-[0_0_20px_rgba(0,0,0,0.5)] transition-all duration-500" style="background: conic-gradient(#222 0% 100%);">
                <div class="w-[100px] h-[100px] bg-[#121212] rounded-full absolute flex flex-col justify-center items-center"><span id="chart-center-text" class="text-2xl font-bold text-gold">--%</span></div>
            </div>
            <div class="flex-1 space-y-3 min-w-[120px]" id="sector-legend"></div>
        </div>
    </div>
</div>
